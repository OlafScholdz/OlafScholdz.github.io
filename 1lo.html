    <!-- Kompas -->
    <div id="compass">
      <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <!-- Tło -->
        <circle cx="40" cy="40" r="38" fill="white" fill-opacity="0.92" stroke="#ddd" stroke-width="1.5"/>

        <!--
          Pozycje na okręgu r=24, środek (40,40):
          9 o'clock  = (16, 40)
          11 o'clock = (28, 19)   ← koniec lewego łuku
          1 o'clock  = (52, 19)   ← koniec prawego łuku
          3 o'clock  = (64, 40)
        -->

        <!-- Strzałka LEWA: łuk od 9→11, grot przy 11 skierowany górno-prawo -->
        <g class="compass-btn" id="btn-left">
          <path d="M 16 40 A 24 24 0 0 1 28 19"
                fill="none" stroke="#555" stroke-width="3" stroke-linecap="round"/>
          <!-- grot przy (28,19), kierunek CW ≈ (21,−12) czyli górno-prawo -->
          <polygon points="28,19 20,20 24,27" fill="#555"/>
        </g>

        <!-- Strzałka PRAWA: łuk od 3→1, grot przy 1 skierowany górno-lewo -->
        <g class="compass-btn" id="btn-right">
          <path d="M 64 40 A 24 24 0 0 0 52 19"
                fill="none" stroke="#555" stroke-width="3" stroke-linecap="round"/>
          <!-- grot przy (52,19), kierunek CCW ≈ (−21,−12) czyli górno-lewo -->
          <polygon points="52,19 56,27 60,20" fill="#555"/>
        </g>

        <!-- Igła -->
        <g id="compass-needle">
          <polygon points="40,10 36,40 44,40" fill="#e53935"/>
          <polygon points="40,70 36,40 44,40" fill="#9e9e9e"/>
          <circle cx="40" cy="40" r="4" fill="white" stroke="#aaa" stroke-width="1.5"/>
        </g>

        <!-- N -->
        <text x="40" y="8" text-anchor="middle" font-size="7" font-weight="bold"
              fill="#e53935" font-family="Arial">N</text>
      </svg>

        /* ===== WYSZUKIWARKA ===== */
        var searchInput    = document.getElementById('search-input');
        var searchDropdown = document.getElementById('search-dropdown');

        searchInput.addEventListener('input', function() {
            var query = this.value.trim().toLowerCase();
            searchDropdown.innerHTML = '';

            if (query.length < 1) {
                searchDropdown.style.display = 'none';
                return;
            }
 /* Filtruj sceny – każde słowo z zapytania musi pasować do nazwy */
            var words = query.split(/\s+/).filter(Boolean);
            var results = Object.keys(SCENES).filter(function(id) {
                var name = SCENES[id].toLowerCase();
                return words.every(function(w) { return name.includes(w); });
            });

            /* Sortuj – więcej pasujących słów = wyżej */
            results.sort(function(a, b) {
                var na = SCENES[a].toLowerCase(), nb = SCENES[b].toLowerCase();
                var scoreA = words.filter(function(w){ return na.includes(w); }).length;
                var scoreB = words.filter(function(w){ return nb.includes(w); }).length;
                return scoreB - scoreA;
            });
            results = results.slice(0, 6);

            if (results.length === 0) {
                searchDropdown.style.display = 'none';
                return;
            }
            

            results.forEach(function(id) {
                var item = document.createElement('div');
                item.className = 'search-item';
                item.innerHTML =
                    '<span class="search-item-icon"><i class="fas fa-map-marker-alt"></i></span>' +
                    '<span>' + SCENES[id] + '</span>';

                item.addEventListener('click', function() {
                    viewer.loadScene(id);             /* przejdź do sceny */
                    searchInput.value  = SCENES[id]; /* wstaw nazwę w pole */
                    searchDropdown.style.display = 'none';
                });

                searchDropdown.appendChild(item);
            });

            searchDropdown.style.display = 'block';
        });

        /* Zamknij dropdown klikając gdziekolwiek indziej */
        document.addEventListener('click', function(e) {
            if (!document.getElementById('search-container').contains(e.target)) {
                searchDropdown.style.display = 'none';
            }
        });

        var SCENE_FLOORS = {
            'wejscie piwnica':0,'sale 6 i 7':0,'sala 3k':0,'sala 3e':0,
            'sala 6e':0,'sala 6m':0,'sala 7e':0,'sala 7m':0,'0s':0,'sala PE':0,
            'sek':1,'ms1d':1,'ms1m':1,'sale 17 i 19':1,'sala 17e':1,'sala 17m':1,
            'sale 8 i 9':1,'sala 8e':1,'sala 8m':1,'sala 9e':1,'sala 9m':1,
            '1s':1,'sala 19e':1,'sala 19m':1,
            'ms2d':2,'ms2m':2,'sale 27 i 28':2,'sala 27e':2,'sala 27m':2,
            'sala 28e':2,'sala 28m':2,'sala 30e':2,'sala 30m':2,
            'sala 33 korytarz':2,'sala 33e':2,'sala 33m':2,
            'sale 34 i 35':2,'sala 34e':2,'sala 34m':2,'sala 35e':2,'sala 35m':2,
            'sale 36 i 37':3,'sala 36e':3,'sala 36m':3,'sala 37e':3,'sala 37m':3,
            'sala 38e':3,'sala 38m':3,'sala 41 korytarz':3,'sala 41e':3,'sala 41m':3,
            'ms3d':3,'sala 43m':3,'sale 43 i 44':3,'sala 44m':3,'3s':3
        };

        var fpCache = {};
        var fpState = { floor:1, scale:1, ox:0, oy:0, imgW:1, imgH:1, img:null, hov:-1 };
        var fpFloor = SCENE_FLOORS[viewer.getScene()] || 1;
        var fpCurrentFloor = fpFloor;

        function loadFpImg(floor, cb) {
            if (fpCache[floor]) { cb(fpCache[floor]); return; }
            var img = new Image();
            img.onload = function() { fpCache[floor] = img; cb(img); };
            img.src = FLOOR_PLANS[floor].img;
        }

        /* ----- Minimapa ----- */
        var mmCanvas = document.getElementById('minimap-canvas');
        var mmCtx    = mmCanvas.getContext('2d');

        function drawMinimap(floor, currentScene) {
            loadFpImg(floor, function(img) {
                var W = mmCanvas.offsetWidth || 126, H = 72;
                mmCanvas.width = W; mmCanvas.height = H;
                var s = Math.min(W / img.naturalWidth, H / img.naturalHeight);
                var dw = img.naturalWidth*s, dh = img.naturalHeight*s;
                var ox = (W-dw)/2, oy = (H-dh)/2;
                mmCtx.clearRect(0,0,W,H);
                mmCtx.drawImage(img, ox, oy, dw, dh);
                if (currentScene) {
                    FLOOR_PLANS[floor].points.forEach(function(p) {
                        var canonScene = SCENE_CANONICAL[currentScene] || currentScene;
                        if (p.scene !== canonScene) return;
                        var cx = ox + p.x*s, cy = oy + p.y*s;
                        mmCtx.beginPath(); mmCtx.arc(cx,cy,5,0,Math.PI*2);
                        mmCtx.fillStyle='#E53935'; mmCtx.fill();
                        mmCtx.strokeStyle='white'; mmCtx.lineWidth=1.5; mmCtx.stroke();
                    });
                }
            });
        }

        drawMinimap(fpCurrentFloor, viewer.getScene());
        viewer.on('scenechange', function(id) {
            var f = SCENE_FLOORS[id];
            if (f !== undefined) { fpCurrentFloor = f; }
            drawMinimap(fpCurrentFloor, id);
        });

        /* ----- Modal ----- */
        var fpModal   = document.getElementById('fp-modal');
        var fpCanvas  = document.getElementById('fp-canvas');
        var fpCtx     = fpCanvas.getContext('2d');
        var fpTooltip = document.getElementById('fp-tooltip');

        function openFloorPlan() {
            fpFloor = fpCurrentFloor;
            updateFpTabs();
            fpModal.classList.add('active');
            renderFp();
        }
        function closeFloorPlan() { fpModal.classList.remove('active'); }
        function setFpFloor(f) { fpFloor = f; updateFpTabs(); renderFp(); }

        function updateFpTabs() {
            document.querySelectorAll('.fp-tab').forEach(function(b,i){
                b.classList.toggle('active', i === fpFloor);
            });
        }

        function renderFp() {
            var wrap = document.getElementById('fp-canvas-wrap');
            loadFpImg(fpFloor, function(img) {
                var mw = wrap.clientWidth - 24, mh = wrap.clientHeight - 24;
                var s  = Math.min(mw/img.naturalWidth, mh/img.naturalHeight);
                var dw = img.naturalWidth*s, dh = img.naturalHeight*s;
                fpState.scale = s;
                fpState.imgW  = img.naturalWidth;
                fpState.imgH  = img.naturalHeight;
                fpState.ox    = (mw-dw)/2 + 12;
                fpState.oy    = (mh-dh)/2 + 12;
                fpState.img   = img;
                fpCanvas.width  = mw + 24;
                fpCanvas.height = mh + 24;
                drawFp(-1);
            });
        }
        
		var SCENE_CANONICAL = {
    'sala 6m': 'sala 6e', 'sala 7m': 'sala 7e',
    'sala 8m': 'sala 8e', 'sala 9m': 'sala 9e',
    'sala 17m': 'sala 17e', 'sala 19m': 'sala 19e',
    'sala 27m': 'sala 27e', 'sala 28m': 'sala 28e',
    'sala 30m': 'sala 30e', 'sala 33m': 'sala 33e',
    'sala 34m': 'sala 34e', 'sala 35m': 'sala 35e',
    'sala 36m': 'sala 36e', 'sala 37m': 'sala 37e',
    'sala 38m': 'sala 38e', 'sala 41m': 'sala 41e'
        };
        function drawFp(hovIdx) {
    var img = fpState.img;
    if (!img) return;
    fpCtx.clearRect(0, 0, fpCanvas.width, fpCanvas.height);
    fpCtx.drawImage(img, fpState.ox, fpState.oy,
                    fpState.imgW*fpState.scale, fpState.imgH*fpState.scale);

    var pts = FLOOR_PLANS[fpFloor].points;
    var rawScene = viewer.getScene();
    var cur = SCENE_CANONICAL[rawScene] || rawScene;

    var baseR    = Math.round(fpCanvas.width * 0.008);
    var hovR     = Math.round(fpCanvas.width * 0.011);
    var fontSize = Math.round(fpCanvas.width * 0.007);

    pts.forEach(function(p, i) {
        var cx = fpState.ox + p.x * fpState.scale;
        var cy = fpState.oy + p.y * fpState.scale;
        var isHov = (i === hovIdx);
        var isCur = (p.scene === cur);
        var r  = isHov ? hovR : baseR;
        var bg = isCur ? '#E53935' : (isHov ? '#0D47A1' : '#1976D2');

        fpCtx.save();
        fpCtx.shadowColor='rgba(0,0,0,0.28)';
        fpCtx.shadowBlur=4; fpCtx.shadowOffsetY=1;
        fpCtx.beginPath(); fpCtx.arc(cx,cy,r,0,Math.PI*2);
        fpCtx.fillStyle=bg; fpCtx.fill();
        fpCtx.restore();

        fpCtx.strokeStyle='white'; fpCtx.lineWidth=Math.max(1, fpState.scale*4);
        fpCtx.beginPath(); fpCtx.arc(cx,cy,r,0,Math.PI*2); fpCtx.stroke();

         
            fpCtx.font = 'bold ' + fontSize + 'px Arial';
            fpCtx.textAlign = 'center';
            var tw = fpCtx.measureText(p.label).width;
            var lx = cx - tw/2 - 3, ly = cy + r + 2;
            fpCtx.fillStyle = 'rgba(255,255,255,0.92)';
            fpCtx.fillRect(lx, ly, tw+6, fontSize+4);
            fpCtx.fillStyle = bg;
            fpCtx.textBaseline = 'top';
            fpCtx.fillText(p.label, cx, ly+2);
        
    });
}

        fpCanvas.addEventListener('mousemove', function(e) {
            var rect = fpCanvas.getBoundingClientRect();
            var sx = fpCanvas.width  / rect.width;
            var sy = fpCanvas.height / rect.height;
            var mx = (e.clientX-rect.left)*sx, my = (e.clientY-rect.top)*sy;
            var pts = FLOOR_PLANS[fpFloor].points, found = -1;
            for (var i=0; i<pts.length; i++) {
                var cx = fpState.ox + pts[i].x*fpState.scale;
                var cy = fpState.oy + pts[i].y*fpState.scale;
                if (Math.sqrt((mx-cx)*(mx-cx)+(my-cy)*(my-cy)) < 18) { found=i; break; }
            }
            fpCanvas.style.cursor = found>=0 ? 'pointer' : 'default';
            if (found>=0) {
                fpTooltip.style.display='block';
                fpTooltip.style.left=(e.clientX+14)+'px';
                fpTooltip.style.top=(e.clientY-10)+'px';
                fpTooltip.textContent = pts[found].full + '  →  kliknij aby przejść';
            } else { fpTooltip.style.display='none'; }
            if (found !== fpState.hov) { fpState.hov=found; drawFp(found); }
        });

        fpCanvas.addEventListener('mouseleave', function() {
            fpTooltip.style.display='none';
            fpState.hov=-1; drawFp(-1);
        });

        fpCanvas.addEventListener('click', function(e) {
            var rect = fpCanvas.getBoundingClientRect();
            var sx = fpCanvas.width/rect.width, sy = fpCanvas.height/rect.height;
            var mx = (e.clientX-rect.left)*sx, my = (e.clientY-rect.top)*sy;
            var pts = FLOOR_PLANS[fpFloor].points;
            for (var i=0; i<pts.length; i++) {
                var cx = fpState.ox + pts[i].x*fpState.scale;
                var cy = fpState.oy + pts[i].y*fpState.scale;
                if (Math.sqrt((mx-cx)*(mx-cx)+(my-cy)*(my-cy)) < 22) {
                    viewer.loadScene(pts[i].scene);
                    closeFloorPlan();
                    fpTooltip.style.display='none';
                    return;
                }
            }
        });

        fpModal.addEventListener('click', function(e) {
            if (e.target===fpModal) closeFloorPlan();
        });

        window.addEventListener('resize', function() {
            if (fpModal.classList.contains('active')) renderFp();
        });
        function showVideoModal(evt, args) {
    var vid = document.getElementById('modal-video');
    vid.src = args.url;
    document.getElementById('video-modal').classList.add('active');
    vid.play().catch(function() {});
}
function closeVideoModal() {
    var vid = document.getElementById('modal-video');
    vid.pause();
    vid.src = '';
    document.getElementById('video-modal').classList.remove('active');
}
document.getElementById('video-modal').addEventListener('click', function(e) {
    if (e.target === this) closeVideoModal();
});
document.getElementById('video-modal-close').addEventListener('click', closeVideoModal);
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeVideoModal();
});
